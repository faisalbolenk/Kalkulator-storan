<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Otomatis</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: auto; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .section { margin-bottom: 30px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; background: #f9f9f9; }
        .result { margin-top: 10px; padding: 15px; background-color: #007bff; color: white; text-align: center; font-size: 1.5em; font-weight: bold; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="section">
        <h3>Storan (Otomatis)</h3>
        <label>Drop:</label>
        <input type="number" id="drop1" oninput="hitung()" placeholder="3500">
        <label>Kasbon:</label>
        <input type="number" id="kasbon" oninput="hitung()" placeholder="1300">
        <label>Storting:</label>
        <input type="number" id="storting" oninput="hitung()" placeholder="3500">
        <label>Transport:</label>
        <input type="number" id="transport" oninput="hitung()" placeholder="25">
        
        <div class="result" id="hasilStoran">Storan: 0</div>
    </div>

    <div class="section">
        <h3>9% Drop (Otomatis)</h3>
        <label>Drop:</label>
        <input type="number" id="drop2" oninput="hitungPersen()" placeholder="3500">
        
        <div class="result" id="hasilPersen">Hasil 9%: 0</div>
    </div>

    <script>
        function hitung() {
            let drop = parseFloat(document.getElementById('drop1').value) || 0;
            let kasbon = parseFloat(document.getElementById('kasbon').value) || 0;
            let storting = parseFloat(document.getElementById('storting').value) || 0;
            let transport = parseFloat(document.getElementById('transport').value) || 0;

            let hasil = (drop * 0.20) + kasbon + storting - drop - transport;
            document.getElementById('hasilStoran').innerText = "Storan: " + hasil.toLocaleString('id-ID');
        }

        function hitungPersen() {
            let drop = parseFloat(document.getElementById('drop2').value) || 0;
            let hasil = drop * 0.09;
            document.getElementById('hasilPersen').innerText = "Hasil 9%: " + hasil.toLocaleString('id-ID');
        }
    </script>
</body>
</html>

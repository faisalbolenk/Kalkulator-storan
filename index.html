<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Storan Pati 5</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 15px; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1.1em; }
        .result-box { padding: 15px; margin-top: 10px; border-radius: 8px; text-align: center; font-weight: bold; color: white; margin-bottom: 10px; }
        .storan { background-color: #007bff; }
        .persen { background-color: #28a745; }
        .final { background-color: #dc3545; }
        .footer { text-align: center; font-size: 0.8em; color: #888; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Kalkulator Storan</h2>
        
        <div class="input-group">
            <label>Drop:</label>
            <input type="number" id="drop" oninput="hitung()" placeholder="0">
        </div>
        <div class="input-group">
            <label>Kasbon:</label>
            <input type="number" id="kasbon" oninput="hitung()" placeholder="0">
        </div>
        <div class="input-group">
            <label>Storting:</label>
            <input type="number" id="storting" oninput="hitung()" placeholder="0">
        </div>
        <div class="input-group">
            <label>Transport:</label>
            <input type="number" id="transport" oninput="hitung()" placeholder="0">
        </div>
        
        <div class="result-box storan" id="hasilStoran">Storan: 0</div>
        <div class="result-box persen" id="hasil9persen">9% Drop: 0</div>
        <div class="result-box final" id="hasilSelisih">Tunai: 0</div>

        <div class="footer">Dibuat oleh: <b>Sigit Ari Wibowo (Pati 5)</b></div>
    </div>

    <script>
        function hitung() {
            // Mengambil elemen input
            let d = document.getElementById('drop').value;
            let k = document.getElementById('kasbon').value;
            let s = document.getElementById('storting').value;
            let t = document.getElementById('transport').value;

            // Mengubah ke angka (jika kosong dianggap 0)
            let drop = parseFloat(d) || 0;
            let kasbon = parseFloat(k) || 0;
            let storting = parseFloat(s) || 0;
            let transport = parseFloat(t) || 0;

            // Rumus
            let storan = (drop * 0.20) + kasbon + storting - drop - transport;
            let persen9 = drop * 0.09;
            let tunai = storan - persen9;

            // Menampilkan hasil
            document.getElementById('hasilStoran').innerText = "Storan: " + storan.toLocaleString('id-ID');
            document.getElementById('hasil9persen').innerText = "9% Drop: " + persen9.toLocaleString('id-ID');
            document.getElementById('hasilSelisih').innerText = "Tunai: " + tunai.toLocaleString('id-ID');
        }
    </script>
</body>
</html>
